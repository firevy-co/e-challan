<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Challan Check | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text-main);
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: none;
            text-align: center;
        }

        .success-message {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
        }

        /* Results Area */
        #results-container {
            display: none;
            width: 100%;
            animation: fadeInUp 0.5s ease-out;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .summary-card.clean {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .summary-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .challan-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .challan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed var(--border);
        }

        .challan-amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f87171;
        }

        .challan-status {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .challan-detail {
            margin-bottom: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .challan-detail span.label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .challan-detail span.value {
            font-size: 1rem;
            color: var(--text-main);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form states */
        #otpForm {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>E-Challan Check</h1>
        <p>Instantly verify pending traffic fines via OTP</p>
    </div>

    <div class="container">
        <!-- Step 1: Request OTP -->
        <div class="glass-card" id="requestCard">
            <form id="requestForm">
                <div class="input-group">
                    <label for="vehicleNumber">Vehicle Number Plate</label>
                    <input type="text" id="vehicleNumber" placeholder="e.g. GJ05CH2906" style="text-transform: uppercase;" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="mobileNumber">Mobile Number (For OTP)</label>
                    <input type="tel" id="mobileNumber" placeholder="10-digit mobile number" maxlength="10" required autocomplete="off">
                </div>
                <button type="submit" id="requestBtn">
                    <span id="requestBtnText">Get OTP</span>
                    <div class="spinner" id="requestSpinner"></div>
                </button>
                <div id="requestError" class="error-message"></div>
            </form>
        </div>

        <!-- Step 2: Verify OTP -->
        <div class="glass-card" id="otpCard" style="display: none;">
            <div class="success-message" id="otpSentMsg">OTP Sent Successfully!</div>
            <form id="otpForm">
                <div class="input-group">
                    <label for="otpInput">Enter OTP</label>
                    <input type="text" id="otpInput" placeholder="Enter the OTP received" required autocomplete="off">
                </div>
                <button type="submit" id="verifyBtn">
                    <span id="verifyBtnText">Verify & Fetch Challans</span>
                    <div class="spinner" id="verifySpinner"></div>
                </button>
                <div id="verifyError" class="error-message"></div>
                
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="#" id="startOverLink" style="color: var(--text-muted); font-size: 0.9rem;">Start Over</a>
                </div>
            </form>
        </div>

        <div id="results-container">
            <!-- Results injected here -->
        </div>
    </div>

    <script>
        // DOM Elements
        const requestForm = document.getElementById('requestForm');
        const otpForm = document.getElementById('otpForm');
        const requestCard = document.getElementById('requestCard');
        const otpCard = document.getElementById('otpCard');
        const resultsContainer = document.getElementById('results-container');
        
        let currentSessionId = null;

        // Step 1: Request OTP
        requestForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const vehicleNumber = document.getElementById('vehicleNumber').value.trim();
            const mobileNumber = document.getElementById('mobileNumber').value.trim();
            if (!vehicleNumber || !mobileNumber) return;

            const btn = document.getElementById('requestBtn');
            const text = document.getElementById('requestBtnText');
            const spinner = document.getElementById('requestSpinner');
            const errorMsg = document.getElementById('requestError');

            errorMsg.style.display = 'none';
            btn.disabled = true;
            text.textContent = 'Requesting...';
            spinner.style.display = 'block';

            try {
                const response = await fetch('/api/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vehicleNumber, mobileNumber })
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || 'Failed to request OTP');
                }

                if (result.sessionId) {
                    // Show OTP form
                    currentSessionId = result.sessionId;
                    requestCard.style.display = 'none';
                    otpCard.style.display = 'block';
                    otpForm.style.display = 'block';
                } else {
                    // Edge case: No login required, just fetch directly
                    throw new Error(result.message);
                }

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.textContent = 'Get OTP';
                spinner.style.display = 'none';
            }
        });

        // Step 2: Verify OTP
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp || !currentSessionId) return;

            const btn = document.getElementById('verifyBtn');
            const text = document.getElementById('verifyBtnText');
            const spinner = document.getElementById('verifySpinner');
            const errorMsg = document.getElementById('verifyError');

            errorMsg.style.display = 'none';
            btn.disabled = true;
            text.textContent = 'Verifying & Fetching...';
            spinner.style.display = 'block';

            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId, otp })
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || 'Verification failed. Incorrect OTP.');
                }

                // Show Results
                otpCard.style.display = 'none';
                renderResults(result.data);

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.textContent = 'Verify & Fetch Challans';
                spinner.style.display = 'none';
            }
        });

        document.getElementById('startOverLink').addEventListener('click', (e) => {
            e.preventDefault();
            location.reload();
        });

        function renderResults(data) {
            let html = '';

            if (data.totalChallans === 0) {
                html += `
                    <div class="summary-card clean">
                        <h2 style="color: #4ade80;">All Clear! 🎉</h2>
                        <p>No pending challans found for ${data.vehicleNumber}</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="summary-card">
                        <h2 style="color: #f87171;">${data.totalChallans} Pending Challan(s)</h2>
                        <p>Action required for ${data.vehicleNumber}</p>
                    </div>
                `;

                data.details.forEach(challan => {
                    html += `
                        <div class="challan-item">
                            <div class="challan-header">
                                <div class="challan-amount">${challan.amount}</div>
                                <div class="challan-status">${challan.status}</div>
                            </div>
                            <div class="challan-detail">
                                <span class="label">Challan Number (Uncensored)</span>
                                <span class="value" style="font-family: monospace; color: #60a5fa; font-weight: bold;">${challan.challanNumber}</span>
                            </div>
                            <div class="challan-detail" style="margin-top: 0.5rem;">
                                <span class="label">Date Issued</span>
                                <span class="value">${challan.date}</span>
                            </div>
                            <div class="challan-detail" style="margin-top: 0.5rem;">
                                <span class="label">Offence Details</span>
                                <span class="value">${challan.offence}</span>
                            </div>
                        </div>
                    `;
                });
            }

            html += `
                <button onclick="location.reload()" style="margin-top: 2rem;">Check Another Vehicle</button>
            `;

            resultsContainer.innerHTML = html;
            resultsContainer.style.display = 'block';
        }
    </script>
</body>
</html>
